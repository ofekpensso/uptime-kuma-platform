---
apiVersion: argoproj.io/v1alpha1
kind: Application

metadata:
  name: monitoring-config
  namespace: argocd

  labels:
    app.kubernetes.io/part-of: uptime-kuma-platform
    environment: dev

  annotations:
    argocd.argoproj.io/sync-wave: "30"

  finalizers:
    - resources-finalizer.argocd.argoproj.io

spec:
  project: default

  source:
    repoURL: https://github.com/ofekpensso/uptime-kuma-platform.git
    targetRevision: main
    path: gitops/manifests/monitoring

    directory:
      recurse: true

  destination:
    server: https://kubernetes.default.svc
    namespace: monitoring

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
      allowEmpty: false

    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
      - PruneLast=true

    retry:
      limit: 5

      backoff:
        duration: 10s
        factor: 2
        maxDuration: 5m