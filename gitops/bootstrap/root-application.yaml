---
apiVersion: argoproj.io/v1alpha1
kind: Application

metadata:
  name: platform-root
  namespace: argocd

  finalizers:
    - resources-finalizer.argocd.argoproj.io

spec:
  project: default

  source:
    repoURL: https://github.com/ofekpensso/uptime-kuma-platform.git
    targetRevision: main
    path: gitops/applications

    directory:
      recurse: true

  destination:
    server: https://kubernetes.default.svc
    namespace: argocd

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
      allowEmpty: false

    retry:
      limit: 5

      backoff:
        duration: 5s
        factor: 2
        maxDuration: 3m
