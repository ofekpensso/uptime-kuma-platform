---
applications:
  platform-root:
    namespace: argocd

    additionalLabels:
      app.kubernetes.io/part-of: uptime-kuma-platform
      environment: dev

    finalizers:
      - resources-finalizer.argocd.argoproj.io

    project: default

    source:
      repoURL: https://github.com/ofekpensso/uptime-kuma-platform.git
      targetRevision: main
      path: gitops/applications

      directory:
        recurse: true

    destination:
      server: https://kubernetes.default.svc
      namespace: argocd

    syncPolicy:
      automated:
        prune: true
        selfHeal: true
        allowEmpty: false
