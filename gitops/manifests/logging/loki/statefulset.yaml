---
apiVersion: apps/v1
kind: StatefulSet

metadata:
  name: loki
  namespace: logging

  labels:
    app.kubernetes.io/name: loki
    app.kubernetes.io/component: logging-backend
    app.kubernetes.io/part-of: uptime-kuma-platform
    environment: dev

spec:
  serviceName: loki
  replicas: 1

  selector:
    matchLabels:
      app.kubernetes.io/name: loki
      app.kubernetes.io/component: logging-backend

  template:
    metadata:
      labels:
        app.kubernetes.io/name: loki
        app.kubernetes.io/component: logging-backend
        app.kubernetes.io/part-of: uptime-kuma-platform
        environment: dev

    spec:
      securityContext:
        fsGroup: 10001

      containers:
        - name: loki
          image: grafana/loki:3.7.3
          imagePullPolicy: IfNotPresent

          args:
            - -config.file=/etc/loki/config/config.yaml

          ports:
            - name: http
              containerPort: 3100

            - name: grpc
              containerPort: 9095

          readinessProbe:
            httpGet:
              path: /ready
              port: http
            initialDelaySeconds: 20
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 6

          livenessProbe:
            httpGet:
              path: /ready
              port: http
            initialDelaySeconds: 60
            periodSeconds: 20
            timeoutSeconds: 3
            failureThreshold: 6

          resources:
            requests:
              cpu: 100m
              memory: 256Mi

            limits:
              cpu: 500m
              memory: 768Mi

          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: false
            runAsNonRoot: true
            runAsUser: 10001
            runAsGroup: 10001
            capabilities:
              drop:
                - ALL

          volumeMounts:
            - name: loki-config
              mountPath: /etc/loki/config
              readOnly: true

            - name: loki-data
              mountPath: /var/loki

      volumes:
        - name: loki-config
          configMap:
            name: loki-config

  volumeClaimTemplates:
    - metadata:
        name: loki-data

        labels:
          app.kubernetes.io/name: loki
          app.kubernetes.io/component: logging-backend
          app.kubernetes.io/part-of: uptime-kuma-platform
          environment: dev

      spec:
        accessModes:
          - ReadWriteOnce

        storageClassName: gp3

        resources:
          requests:
            storage: 8Gi
