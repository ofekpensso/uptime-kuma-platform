---
apiVersion: v1
kind: ConfigMap

metadata:
  name: loki-config
  namespace: logging

  labels:
    app.kubernetes.io/name: loki
    app.kubernetes.io/component: logging-backend
    app.kubernetes.io/part-of: uptime-kuma-platform
    environment: dev

data:
  config.yaml: |
    auth_enabled: false

    server:
      http_listen_port: 3100
      grpc_listen_port: 9095

    common:
      path_prefix: /var/loki
      replication_factor: 1

      ring:
        instance_addr: 127.0.0.1
        kvstore:
          store: inmemory

      storage:
        filesystem:
          chunks_directory: /var/loki/chunks
          rules_directory: /var/loki/rules

    schema_config:
      configs:
        - from: 2024-04-01
          store: tsdb
          object_store: filesystem
          schema: v13
          index:
            prefix: loki_index_
            period: 24h

    analytics:
      reporting_enabled: false

    limits_config:
      allow_structured_metadata: true
      volume_enabled: true

    ruler:
      enable_api: false
