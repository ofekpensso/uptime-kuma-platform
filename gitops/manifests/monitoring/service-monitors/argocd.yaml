---
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor

metadata:
  name: argocd-application-controller
  namespace: monitoring

  labels:
    release: kube-prometheus-stack
    app.kubernetes.io/name: argocd-application-controller-monitor
    app.kubernetes.io/part-of: uptime-kuma-platform
    environment: dev
    managed-by: argocd

spec:
  namespaceSelector:
    matchNames:
      - argocd

  selector:
    matchLabels:
      app.kubernetes.io/instance: argocd
      app.kubernetes.io/name: argocd-metrics
      app.kubernetes.io/component: application-controller

  endpoints:
    - port: http-metrics
      path: /metrics
      interval: 30s
      scrapeTimeout: 10s

