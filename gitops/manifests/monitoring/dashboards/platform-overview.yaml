          "title": "Memory Usage by Namespace",
          "gridPos": {
            "h": 8,
            "w": 8,
            "x": 16,
            "y": 12
          },
          "datasource": {
            "type": "prometheus",
            "uid": "prometheus"
          },
          "targets": [
            {
              "refId": "A",
              "expr": "sum by (namespace) (container_memory_working_set_bytes{container!=\"\",container!=\"POD\",pod!=\"\"})",
              "legendFormat": "{{namespace}}"
            }
          ],
          "options": {
            "legend": {
              "calcs": [
                "lastNotNull",
                "mean",
                "max"
              ],
              "displayMode": "table",
              "placement": "bottom"
