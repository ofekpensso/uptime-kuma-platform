                  }
                ]
              }
            },
            "overrides": []
          }
        },
        {
          "id": 14,
          "type": "bargauge",
          "title": "PVC Usage",
          "gridPos": {
            "h": 8,
            "w": 12,
            "x": 0,
            "y": 20
          },
          "datasource": {
            "type": "prometheus",
            "uid": "prometheus"
          },
          "targets": [
            {
              "refId": "A",
              "expr": "max by (namespace, persistentvolumeclaim) (100 * kubelet_volume_stats_used_bytes / kubelet_volume_stats_capacity_bytes)",
              "instant": true,
              "legendFormat": "{{namespace}} / {{persistentvolumeclaim}}"
            }
          ],
          "options": {
            "displayMode": "gradient",
            "orientation": "horizontal",
            "reduceOptions": {
              "calcs": [
                "lastNotNull"
              ],
              "fields": "",
              "values": false
            },
            "showUnfilled": true
          },
          "fieldConfig": {
            "defaults": {
              "unit": "percent",
              "min": 0,
              "max": 100,
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  {
                    "color": "green",
                    "value": null
                  },
                  {
                    "color": "yellow",
                    "value": 70
                  },
                  {
                    "color": "red",
                    "value": 85
                  }
                ]
              }
            },
            "overrides": []
          }
        },
        {
          "id": 15,
          "type": "table",
          "title": "Pod Restarts \u2014 Last Hour",
          "gridPos": {
            "h": 8,
            "w": 12,
            "x": 12,
            "y": 20
          },
          "datasource": {
            "type": "prometheus",
            "uid": "prometheus"
          },
          "targets": [
            {
              "refId": "A",
              "expr": "sum by (namespace, pod) (increase(kube_pod_container_status_restarts_total[1h])) > 0",
              "format": "table",
              "instant": true
            }
          ],
          "options": {
            "cellHeight": "sm",
            "showHeader": true,
            "sortBy": [
              {
                "displayName": "Restarts",
                "desc": true
              }
            ]
          },
          "transformations": [
            {
              "id": "organize",
              "options": {
                "excludeByName": {
                  "Time": true,
                  "__name__": true
                },
                "indexByName": {
                  "namespace": 0,
                  "pod": 1,
                  "Value": 2
                },
                "renameByName": {
                  "namespace": "Namespace",
                  "pod": "Pod",
                  "Value": "Restarts"
                }
              }
            }
          ],
          "fieldConfig": {
            "defaults": {},
            "overrides": []
          }
        }
      ],
      "refresh": "30s",
      "schemaVersion": 39,
      "tags": [
        "platform",
        "kubernetes",
        "eks",
        "dev"
      ],
      "templating": {
        "list": []
      },
      "time": {
        "from": "now-6h",
        "to": "now"
      },
      "timezone": "browser",
      "title": "Platform Overview",
      "uid": "platform-overview",
      "version": 1
    }
