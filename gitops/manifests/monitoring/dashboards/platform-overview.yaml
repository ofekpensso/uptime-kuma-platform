---
apiVersion: v1
kind: ConfigMap

metadata:
  name: grafana-dashboard-platform-overview
  namespace: monitoring

  labels:
    grafana_dashboard: "1"
    app.kubernetes.io/name: platform-overview-dashboard
    app.kubernetes.io/part-of: uptime-kuma-platform
    environment: dev
    managed-by: argocd

data:
  platform-overview.json: |-
    {
      "annotations": {
        "list": []
      },
      "editable": false,
      "graphTooltip": 1,
      "panels": [
        {
          "id": 1,
          "type": "stat",
          "title": "Nodes Ready",
          "gridPos": {
            "h": 4,
            "w": 3,
            "x": 0,
            "y": 0
          },
          "datasource": {
            "type": "prometheus",
            "uid": "prometheus"
          },
          "targets": [
            {
              "refId": "A",
              "expr": "sum(kube_node_status_condition{condition=\"Ready\",status=\"true\"}) or vector(0)",
              "instant": true
            }
          ],
          "options": {
            "colorMode": "value",
            "graphMode": "area",
            "justifyMode": "auto",
            "orientation": "auto",
            "reduceOptions": {
              "calcs": [
                "lastNotNull"
              ],
              "fields": "",
              "values": false
            },
            "textMode": "auto"
          },
          "fieldConfig": {
            "defaults": {
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  {
                    "color": "red",
                    "value": null
                  },
                  {
                    "color": "green",
                    "value": 1
                  }
                ]
              },
              "decimals": 0
            },
            "overrides": []
          }
        },
        {
          "id": 2,
