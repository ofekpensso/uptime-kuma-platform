          "gridPos": {
            "h": 4,
            "w": 3,
            "x": 21,
            "y": 0
          },
          "datasource": {
            "type": "prometheus",
            "uid": "prometheus"
          },
          "targets": [
            {
              "refId": "A",
              "expr": "sum(argocd_app_info{health_status=~\"Degraded|Missing|Unknown\"}) or vector(0)",
              "instant": true
