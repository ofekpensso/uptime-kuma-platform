---
apiVersion: v1
kind: ConfigMap

metadata:
  name: grafana-dashboard-gitops
  namespace: monitoring

  labels:
    grafana_dashboard: "1"
    app.kubernetes.io/name: gitops-dashboard
    app.kubernetes.io/part-of: uptime-kuma-platform
    environment: dev
    managed-by: argocd

data:
  gitops-overview.json: |-
    {
      "annotations": {
        "list": []
      },
      "editable": false,
      "graphTooltip": 1,
      "panels": [
        {
          "id": 1,
          "type": "stat",
          "title": "Argo CD Targets Up",
          "gridPos": {
            "h": 4,
            "w": 6,
            "x": 0,
            "y": 0
          },
          "datasource": {
            "type": "prometheus",
            "uid": "prometheus"
          },
          "targets": [
            {
              "refId": "A",
              "expr": "sum(up{namespace=\"argocd\"}) or vector(0)",
              "instant": true
            }
          ],
          "options": {
            "colorMode": "value",
            "graphMode": "area",
            "justifyMode": "auto",
            "orientation": "auto",
            "reduceOptions": {
              "calcs": [
                "lastNotNull"
              ],
              "fields": "",
              "values": false
            },
            "textMode": "auto"
          },
          "fieldConfig": {
            "defaults": {
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  {
                    "color": "red",
                    "value": null
                  },
                  {
                    "color": "green",
                    "value": 1
                  }
                ]
              }
            },
            "overrides": []
          }
        },
        {
          "id": 2,
          "type": "stat",
          "title": "Total Applications",
          "gridPos": {
            "h": 4,
            "w": 6,
            "x": 6,
            "y": 0
          },
          "datasource": {
            "type": "prometheus",
            "uid": "prometheus"
          },
          "targets": [
            {
              "refId": "A",
              "expr": "count(argocd_app_info) or vector(0)",
              "instant": true
            }
          ],
          "options": {
            "colorMode": "value",
            "graphMode": "area",
            "justifyMode": "auto",
            "orientation": "auto",
            "reduceOptions": {
              "calcs": [
                "lastNotNull"
              ],
              "fields": "",
              "values": false
            },
            "textMode": "auto"
          },
          "fieldConfig": {
            "defaults": {
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  {
                    "color": "green",
                    "value": null
                  }
                ]
              }
            },
            "overrides": []
          }
        },
        {
          "id": 3,
          "type": "stat",
          "title": "Applications Synced",
          "gridPos": {
            "h": 4,
            "w": 6,
            "x": 12,
            "y": 0
