---
apiVersion: external-secrets.io/v1
kind: ExternalSecret

metadata:
  name: uptime-kuma-prometheus-credentials
  namespace: monitoring

  labels:
    app.kubernetes.io/name: uptime-kuma-prometheus-credentials
    app.kubernetes.io/part-of: uptime-kuma-platform
    environment: dev
    managed-by: argocd

  annotations:
    argocd.argoproj.io/sync-wave: "0"

spec:
  refreshInterval: 1h
  refreshPolicy: Periodic

  secretStoreRef:
    name: aws-secrets-manager
    kind: ClusterSecretStore

  target:
    name: uptime-kuma-prometheus-credentials
    creationPolicy: Owner
    deletionPolicy: Retain

    template:
      type: Opaque
      engineVersion: v2
      mergePolicy: Replace

      metadata:
        labels:
          app.kubernetes.io/name: uptime-kuma-prometheus-credentials
          app.kubernetes.io/part-of: uptime-kuma-platform
          environment: dev
          managed-by: external-secrets

      data:
        username: ""
        password: "{{ .password }}"

  data:
    - secretKey: password

      remoteRef:
        key: uptime-kuma/dev/prometheus-api-key
        property: password
        conversionStrategy: Default
        decodingStrategy: None
        metadataPolicy: None
        nullBytePolicy: Ignore
