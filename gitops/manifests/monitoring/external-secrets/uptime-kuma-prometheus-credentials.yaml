---
apiVersion: external-secrets.io/v1
kind: ExternalSecret

metadata:
  name: uptime-kuma-prometheus-credentials
  namespace: monitoring

  labels:
    app.kubernetes.io/name: uptime-kuma-prometheus-credentials
    app.kubernetes.io/part-of: uptime-kuma-platform
    environment: dev
    managed-by: argocd

  annotations:
    argocd.argoproj.io/sync-wave: "0"

spec:
  refreshInterval: 1h

  secretStoreRef:
    name: aws-secrets-manager
    kind: ClusterSecretStore

  target:
    name: uptime-kuma-prometheus-credentials
    creationPolicy: Owner

    template:
      type: Opaque

      metadata:
        labels:
          app.kubernetes.io/name: uptime-kuma-prometheus-credentials
          app.kubernetes.io/part-of: uptime-kuma-platform
          environment: dev
          managed-by: external-secrets

  data:
    - secretKey: password

      remoteRef:
        key: uptime-kuma/dev/prometheus-api-key
        property: password