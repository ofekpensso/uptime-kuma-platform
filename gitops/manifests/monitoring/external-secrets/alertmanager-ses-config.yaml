---
apiVersion: external-secrets.io/v1
kind: ExternalSecret

metadata:
  name: alertmanager-ses-config
  namespace: monitoring

  labels:
    app.kubernetes.io/name: alertmanager-ses-config
    app.kubernetes.io/part-of: uptime-kuma-platform
    environment: dev
    managed-by: argocd

  annotations:
    argocd.argoproj.io/sync-wave: "0"

spec:
  refreshInterval: 1h0m0s
  refreshPolicy: Periodic

  secretStoreRef:
    name: aws-secrets-manager
    kind: ClusterSecretStore

  target:
    name: alertmanager-ses-config
    creationPolicy: Owner
    deletionPolicy: Retain

    template:
      type: Opaque
      engineVersion: v2
      mergePolicy: Replace

      metadata:
        labels:
          app.kubernetes.io/name: alertmanager-ses-config
          app.kubernetes.io/part-of: uptime-kuma-platform
          environment: dev
          managed-by: external-secrets

      data:
        alertmanager.yaml: |-
          global:
            resolve_timeout: 5m
            smtp_from: "{{ .from_address }}"
            smtp_smarthost: "{{ .smtp_host }}:{{ .smtp_port }}"
            smtp_auth_username: "{{ .smtp_username }}"
            smtp_auth_password: "{{ .smtp_password }}"
            smtp_require_tls: true

          inhibit_rules:
            - source_matchers:
                - 'severity = critical'
              target_matchers:
                - 'severity =~ warning|info'
              equal:
                - namespace
                - alertname

            - source_matchers:
                - 'severity = warning'
              target_matchers:
                - 'severity = info'
              equal:
                - namespace
                - alertname

            - source_matchers:
                - 'alertname = InfoInhibitor'
              target_matchers:
                - 'severity = info'
              equal:
                - namespace

            - target_matchers:
                - 'alertname = InfoInhibitor'

          route:
            group_by:
              - alertname
              - namespace

            group_wait: 30s
            group_interval: 5m
            repeat_interval: 12h

            receiver: "null"

            routes:
              - receiver: "null"
                matchers:
                  - 'alertname = "Watchdog"'

              - receiver: email
                matchers:
                  - 'severity =~ "warning|critical"'

          receivers:
            - name: "null"

            - name: email
              email_configs:
                - to: "{{ .from_address }}"
                  send_resolved: true

  dataFrom:
    - extract:
        key: uptime-kuma/shared/alertmanager-ses-smtp
        conversionStrategy: Default
        decodingStrategy: None
        metadataPolicy: None
        nullBytePolicy: Ignore