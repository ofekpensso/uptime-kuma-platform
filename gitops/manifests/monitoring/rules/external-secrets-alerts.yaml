---
apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule

metadata:
  name: external-secrets-alerts
  namespace: monitoring

  labels:
    release: kube-prometheus-stack
    app.kubernetes.io/name: external-secrets-alerts
    app.kubernetes.io/part-of: uptime-kuma-platform
    environment: dev
    managed-by: argocd

spec:
  groups:
    - name: external-secrets.availability.rules

      rules:
        - alert: ExternalSecretsMetricsTargetDown

          expr: |
            up{
              namespace="external-secrets"
            } == 0

          for: 5m

          labels:
            severity: warning
            environment: dev
            component: external-secrets

          annotations:
            summary: External Secrets metrics target is down
            description: >-
              Prometheus has been unable to scrape External Secrets
              service {{ $labels.service }} at {{ $labels.instance }}
              for at least five minutes.

    - name: external-secrets.resources.rules

      rules:
        - alert: ClusterSecretStoreNotReady

          expr: |
            clustersecretstore_status_condition{
              condition="Ready",
              status="False"
            } == 1

          for: 10m

          labels:
            severity: critical
            environment: dev
            component: external-secrets

          annotations:
            summary: ClusterSecretStore is not ready
            description: >-
              ClusterSecretStore {{ $labels.name }} has remained
              not ready for at least ten minutes.

        - alert: ExternalSecretNotReady

          expr: |
            externalsecret_status_condition{
              condition="Ready",
              status="False"
            } == 1

          for: 10m

          labels:
            severity: critical
            environment: dev
            component: external-secrets

          annotations:
            summary: ExternalSecret is not ready
            description: >-
              ExternalSecret {{ $labels.name }} in namespace
              {{ $labels.namespace }} has remained not ready
              for at least ten minutes.

        - alert: ExternalSecretSyncErrors

          expr: |
            increase(
              externalsecret_sync_calls_error[10m]
            ) > 0

          labels:
            severity: warning
            environment: dev
            component: external-secrets

          annotations:
            summary: ExternalSecret synchronization errors detected
            description: >-
              External Secrets Operator reported one or more secret
              synchronization errors during the last ten minutes.

    - name: external-secrets.controller.rules

      rules:
        - alert: ExternalSecretsReconcileErrors

          expr: |
            sum by (controller) (
              increase(
                controller_runtime_reconcile_total{
                  service=~"external-secrets.*",
                  result="error"
                }[10m]
              )
            ) > 0

          labels:
            severity: warning
            environment: dev
            component: external-secrets

          annotations:
            summary: External Secrets reconciliation errors detected
            description: >-
              External Secrets controller {{ $labels.controller }}
              reported reconciliation errors during the last ten minutes.

        - alert: ExternalSecretsWebhookErrors

          expr: |
            sum (
              increase(
                controller_runtime_webhook_requests_total{
                  service=~"external-secrets.*",
                  code=~"5.."
                }[10m]
              )
            ) > 0

          labels:
            severity: warning
            environment: dev
            component: external-secrets-webhook

          annotations:
            summary: External Secrets webhook errors detected
            description: >-
              The External Secrets webhook returned one or more
              HTTP 5xx responses during the last ten minutes.